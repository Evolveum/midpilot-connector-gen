services:
  midpilot-connector-gen:
    build: .
    image: midpilot-connector-gen:latest
    container_name: api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      LOGGING__LEVEL: info
      DATABASE__HOST: db
      DATABASE__PORT: 5432
      DATABASE__URL: postgresql+asyncpg://${DATABASE__USER}:${DATABASE__PASSWORD}@db:5432/${DATABASE__NAME}
    ports:
      - "${HOST_PORT:-8090}:8090"

  db:
    image: postgres:15-alpine
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE__NAME}
      POSTGRES_USER: ${DATABASE__USER}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE__USER} -d ${DATABASE__NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    ports:
      - ${DATABASE__EXT_PORT}:${DATABASE__INT_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
